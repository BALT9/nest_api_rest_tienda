version: '3.9'

services:
  backend_nest_inventario:
    container_name: backend_nest_inventario
    build: 
      context: ./
      dockerfile: Dockerfile
    ports:
      - "5000:3000"   # 👈 espacio después del guion
    depends_on:
      - mysql_nest
  
  mysql_nest:
    container_name: mysql_nest
    image: mysql:8.0
    restart: always
    ports:
      - "3307:3306"
    env_file:
      - .env
    volumes:
      - mysql_data:/var/lib/mysql   # 👈 mejor nombre coherente

volumes:
  mysql_data: